<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />

    <!-- ✅ SEO Meta Tags -->
    <title>SmartReadsML - Personalized Book Recommendations using AI</title>
    <meta
      name="description"
      content="SmartReadsML uses Machine Learning to give you personalized book recommendations. Discover your next favorite book based on your reading taste."
    />
    <meta
      name="keywords"
      content="book recommendations, AI book suggestions, personalized books, machine learning books, best books, book discovery, SmartReadsML"
    />
    <meta name="author" content="Mohit Pradhan" />
    <meta name="robots" content="index, follow" />

    <!-- ✅ Google Verification -->
    <meta
      name="google-site-verification"
      content="fC6ynm80Y__AWTYW6ezhoFu9hUtFg-0NQ3JxlIA3JRc"
    />

    <!-- ✅ Open Graph (WhatsApp, Facebook, LinkedIn previews) -->
    <meta
      property="og:title"
      content="SmartReadsML - Personalized Book Recommendations"
    />
    <meta
      property="og:description"
      content="Discover your next favorite book using AI-powered recommendations. Sign up free on SmartReadsML."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://smartreads-app.vercel.app/" />
    <meta
      property="og:image"
      content="https://smartreads-app.vercel.app/logo192.png"
    />
    <meta property="og:site_name" content="SmartReadsML" />

    <!-- ✅ Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="SmartReadsML - AI Book Recommendations"
    />
    <meta
      name="twitter:description"
      content="Get personalized book recommendations powered by Machine Learning."
    />
    <meta
      name="twitter:image"
      content="https://smartreads-app.vercel.app/logo192.png"
    />

    <!-- ✅ Canonical URL -->
    <link rel="canonical" href="https://smartreads-app.vercel.app/" />

    <!-- Icons & Manifest -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ✅ Structured Data for Google (Rich Results) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "SmartReadsML",
        "url": "https://smartreads-app.vercel.app",
        "description": "AI-powered personalized book recommendation app using Machine Learning",
        "applicationCategory": "Entertainment",
        "operatingSystem": "All",
        "author": {
          "@type": "Person",
          "name": "Mohit Pradhan"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        }
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
